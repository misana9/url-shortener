services:
  api:
    build: .
    depends_on:
      - postgres
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    
    volumes:
      - ./:/usr/app:ro
    ports:
      - "8000:8000"
    env_file:
      - ./.env
  
  postgres:
    image: postgres
    environment:
       - POSTGRES_USER=jdeeza
       - POSTGRES_PASSWORD=password123
       - POSTGRES_DB=urlshortener
    volumes:
      - postgres-db:/var/lib/postgresql

      # add your DB/env vars here

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://127.0.0.1:8000"
    ports:
      - "3000:80"

volumes:
  postgres-db: